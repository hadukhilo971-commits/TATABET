<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tata Bet - Deposit</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="deposit-body">
    <div class="deposit-container">
        <div class="deposit-header">
            <i class="fa-solid fa-arrow-left" onclick="history.back()"></i>
            <h2>Deposit Funds</h2>
        </div>

        <div class="deposit-card">
            <div class="info-badge">
                <i class="fa-solid fa-triangle-exclamation"></i>
                <span>Deposit Range: <b>₹300 - ₹50,000</b></span>
            </div>

            <p class="instruction">Scan MobiKwik QR Code to Pay:</p>
            
            <!-- Clean QR Display Box -->
            <div class="qr-box-clean">
                <img src="qr.png" alt="MobiKwik QR Code">
            </div>

            <div class="amount-options">
                <button type="button" onclick="setAmount(300)">₹300</button>
                <button type="button" onclick="setAmount(1000)">₹1000</button>
                <button type="button" onclick="setAmount(5000)">₹5000</button>
                <button type="button" onclick="setAmount(10000)">₹10,000</button>
            </div>

            <div class="form-group">
                <label>Enter Amount (₹300 to ₹50,000):</label>
                <input type="number" id="customAmount" placeholder="Enter amount" min="300" max="50000" value="300">
            </div>

            <div class="form-group">
                <label>Enter 12-Digit UTR / Transaction ID:</label>
                <input type="text" id="utrInput" placeholder="Enter UTR number after payment">
            </div>

            <button class="submit-deposit-btn" onclick="submitDeposit()">Confirm & Submit Deposit</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
