<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deposit - Tata Bet</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .deposit-container {
            padding: 20px;
            max-width: 450px;
            margin: 0 auto;
        }
        .deposit-card {
            background: #171124;
            border: 1px solid #2a2040;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
        }
        .amount-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin: 15px 0;
        }
        .amt-btn {
            background: #100b1a;
            border: 1px solid #32254f;
            color: white;
            padding: 10px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        .amt-btn:hover {
            background: #ff2d55;
            border-color: #ff2d55;
        }
        .qr-box {
            background: white;
            padding: 10px;
            border-radius: 10px;
            display: inline-block;
            margin: 15px 0;
        }
        .qr-box img {
            width: 160px;
            height: 160px;
            display: block;
        }
        .input-group {
            margin-bottom: 15px;
            text-align: left;
        }
        .input-group label {
            font-size: 12px;
            color: #a89bc9;
            display: block;
            margin-bottom: 5px;
        }
        .input-group input {
            width: 100%;
            padding: 12px;
            background: #100b1a;
            border: 1px solid #32254f;
            border-radius: 8px;
            color: white;
            font-size: 14px;
        }
        .btn-submit {
            width: 100%;
            padding: 14px;
            background: #00ffcc;
            color: #0d0914;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 15px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo" onclick="location.href='index.html'" style="cursor: pointer;"><i class="fa-solid fa-arrow-left"></i> Deposit Funds</div>
        <div class="header-right">
            <div class="balance-box">
                <i class="fa-solid fa-wallet"></i>
                <span>₹0.00</span>
            </div>
        </div>
    </header>

    <div class="deposit-container">
        <div class="deposit-card">
            <h3>Select Deposit Amount</h3>
            <div class="amount-grid">
                <button class="amt-btn" onclick="setAmount(500)">₹500</button>
                <button class="amt-btn" onclick="setAmount(1000)">₹1,000</button>
                <button class="amt-btn" onclick="setAmount(2500)">₹2,500</button>
                <button class="amt-btn" onclick="setAmount(5000)">₹5,000</button>
                <button class="amt-btn" onclick="setAmount(10000)">₹10,000</button>
                <button class="amt-btn" onclick="setAmount(25000)">₹25,000</button>
            </div>

            <div class="input-group">
                <label>Or Enter Custom Amount (Min ₹500)</label>
                <input type="number" id="customAmt" placeholder="Enter amount in INR">
            </div>

            <div class="qr-box">
                <!-- Aapka apna scanner image file -->
                <img src="Screenshot_20260723_101139_MobiKwik.jpg" alt="UPI QR Code">
            </div>
            <p style="font-size: 12px; color: #a89bc9; margin-bottom: 15px;">Scan QR via PhonePe / GPay / Paytm & Pay</p>

            <div class="input-group">
                <label>Enter 12-Digit UTR / Reference Number</label>
                <input type="text" id="utrNumber" placeholder="e.g. 4235xxxxxxxx">
            </div>

            <button class="btn-submit" onclick="submitDeposit()">Submit UTR & Verify</button>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="index.html"><i class="fa-solid fa-house"></i><span>Home</span></a>
        <a href="deposit.html" class="active"><i class="fa-solid fa-wallet"></i><span>Deposit</span></a>
        <a href="withdrawal.html"><i class="fa-solid fa-money-bill-transfer"></i><span>Withdraw</span></a>
        <a href="https://t.me/Tatabet9719" target="_blank"><i class="fa-brands fa-telegram" style="color: #0088cc;"></i><span>Support</span></a>
    </nav>

    <script>
        function setAmount(val) {
            document.getElementById('customAmt').value = val;
        }
        function submitDeposit() {
            let utr = document.getElementById('utrNumber').value;
            if(utr.length >= 10) {
                alert("Deposit request submitted successfully! Your balance will be updated after verification.");
                document.getElementById('utrNumber').value = '';
                document.getElementById('customAmt').value = '';
            } else {
                alert("Please enter a valid 12-digit UTR/Reference number.");
            }
        }
    </script>
</body>
</html>
