<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tata Bet - Official Website</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="logo">TATA BET</div>
        <div class="header-right">
            <div class="balance-box" onclick="location.href='deposit.html'">
                <i class="fa-solid fa-circle-plus"></i>
                <span id="userBalance">₹0.00</span>
            </div>
            <div class="profile-icon" onclick="location.href='login.html'">
                <i class="fa-solid fa-user"></i>
            </div>
        </div>
    </header>

    <!-- Top Categories Tabs -->
    <div class="cat-tabs">
        <button class="active" onclick="filterCategory('all')">All</button>
        <button onclick="filterCategory('casino')">Casino</button>
        <button onclick="filterCategory('cricket')">Cricket</button>
        <button onclick="filterCategory('live')">Live Casino</button>
        <button onclick="filterCategory('slots')">Slots</button>
    </div>

    <!-- Main Banner -->
    <section class="banner" onclick="location.href='deposit.html'">
        <img src="Screenshot_20260723_101554_Gallery.jpg" alt="Zimbabwe vs India" class="banner-img">
    </section>

    <!-- Games Grid -->
    <div class="section-title">Popular Games</div>
    <section class="game-grid">
        <!-- Aviator -->
        <div class="game-card" onclick="location.href='deposit.html'">
            <img src="Screenshot_20260723_105242_Chrome.jpg" alt="Aviator" class="game-banner-img">
        </div>

        <!-- Ice Fishing (Fixed with exact GitHub file name) -->
        <div class="game-card" onclick="location.href='deposit.html'">
            <img src="Screenshot_20260723_100943_Chrome.jpg" alt="Ice Fishing" class="game-banner-img">
        </div>

        <!-- Neon Cricket -->
        <div class="game-card" onclick="location.href='deposit.html'">
            <img src="Screenshot_20260723_105228_Chrome.jpg" alt="Neon Cricket" class="game-banner-img">
        </div>

        <!-- Rummy -->
        <div class="game-card" onclick="location.href='deposit.html'">
            <img src="Screenshot_20260723_105255_Chrome.jpg" alt="Rummy" class="game-banner-img">
        </div>

        <!-- Slots -->
        <div class="game-card" onclick="location.href='deposit.html'">
            <img src="Screenshot_20260723_105307_Chrome.jpg" alt="Slots" class="game-banner-img">
        </div>
    </section>

    <!-- Bottom Navigation Bar -->
    <nav class="bottom-nav">
        <a href="index.html" class="active"><i class="fa-solid fa-house"></i><span>Home</span></a>
        <a href="index.html"><i class="fa-solid fa-coins"><span>Casino</span></a>
        <a href="index.html"><i class="fa-solid fa-futbol"></i><span>Sport</span></a>
        <a href="deposit.html"><i class="fa-solid fa-ticket"></i><span>Bet slip</span></a>
        <a href="login.html"><i class="fa-solid fa-bars"></i><span>Menu</span></a>
    </nav>

    <script src="script.js"></script>
</body>
</html>
