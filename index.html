<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tata Bet - Official Website</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="logo">TATA BET</div>
        <div class="header-right">
            <div class="balance-box" onclick="location.href='deposit.html'">
                <i class="fa-solid fa-circle-plus"></i>
                <span id="userBalance">₹0.00</span>
            </div>
            <div class="profile-icon" onclick="checkAuth()">
                <i class="fa-solid fa-user"></i>
            </div>
        </div>
    </header>

    <!-- Top Categories Tabs -->
    <div class="cat-tabs">
        <button class="active" onclick="filterCategory('all')">All</button>
        <button onclick="filterCategory('casino')">Casino</button>
        <button onclick="filterCategory('cricket')">Cricket</button>
        <button onclick="filterCategory('live')">Live Casino</button>
        <button onclick="filterCategory('slots')">Slots</button>
    </div>

    <!-- Main Banner -->
    <section class="banner" onclick="location.href='deposit.html'">
        <div class="banner-content">
            <h2>Zimbabwe – India</h2>
            <p>Cricket. T20</p>
            <button class="bet-btn">Place a bet &rarr;</button>
        </div>
    </section>

    <!-- Games Grid with Images/Icons -->
    <div class="section-title">Popular Games</div>
    <section class="game-grid">
        <div class="game-card" onclick="location.href='deposit.html'">
            <div class="badge">TOP</div>
            <div class="game-thumb aviator-bg"><i class="fa-solid fa-plane-up"></i></div>
            <div class="game-info">
                <h3>AVIATOR</h3>
                <p>SPRIBE</p>
            </div>
        </div>

        <div class="game-card" onclick="location.href='deposit.html'">
            <div class="badge">TOP</div>
            <div class="game-thumb ice-bg"><i class="fa-solid fa-water"></i></div>
            <div class="game-info">
                <h3>ICE FISHING</h3>
                <p>EVOLUTION</p>
            </div>
        </div>

        <div class="game-card" onclick="location.href='deposit.html'">
            <div class="badge">TOP</div>
            <div class="game-thumb cricket-bg"><i class="fa-solid fa-baseball-bat-ball"></i></div>
            <div class="game-info">
                <h3>NEON CRICKET</h3>
                <p>BATERY GAMES</p>
            </div>
        </div>

        <div class="game-card" onclick="location.href='deposit.html'">
            <div class="badge">TOP</div>
            <div class="game-thumb rummy-bg"><i class="fa-solid fa-clone"></i></div>
            <div class="game-info">
                <h3>RUMMY</h3>
                <p>JILI GAMES</p>
            </div>
        </div>

        <div class="game-card" onclick="location.href='deposit.html'">
            <div class="badge">TOP</div>
            <div class="game-thumb jetx-bg"><i class="fa-solid fa-jet-fighter"></i></div>
            <div class="game-info">
                <h3>JETX</h3>
                <p>SMARTSOFT</p>
            </div>
        </div>

        <div class="game-card" onclick="location.href='deposit.html'">
            <div class="badge">TOP</div>
            <div class="game-thumb slots-bg"><i class="fa-solid fa-rotate"></i></div>
            <div class="game-info">
                <h3>SLOTS 777</h3>
                <p>HOT GAMES</p>
            </div>
        </div>
    </section>

    <!-- Bottom Navigation Bar -->
    <nav class="bottom-nav">
        <a href="index.html" class="active"><i class="fa-solid fa-house"></i><span>Home</span></a>
        <a href="index.html"><i class="fa-solid fa-coins"></i><span>Casino</span></a>
        <a href="index.html"><i class="fa-solid fa-futbol"></i><span>Sport</span></a>
        <a href="deposit.html"><i class="fa-solid fa-ticket"></i><span>Bet slip</span></a>
        <a href="login.html"><i class="fa-solid fa-bars"></i><span>Menu</span></a>
    </nav>

    <script src="script.js"></script>
</body>
</html>
