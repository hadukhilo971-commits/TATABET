<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tata Bet - Official Website</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="logo">TATA BET</div>
        <div class="header-right">
            <div class="balance-box">
                <i class="fa-solid fa-circle-plus" onclick="location.href='deposit.html'"></i>
                <span>₹3,76,339.66</span>
            </div>
            <div class="profile-icon" onclick="location.href='login.html'">
                <i class="fa-solid fa-user"></i>
            </div>
        </div>
    </header>

    <!-- Main Banner -->
    <section class="banner" onclick="location.href='deposit.html'">
        <div class="banner-content">
            <h2>Zimbabwe – India</h2>
            <p>Cricket. T20</p>
            <button class="bet-btn">Place a bet &rarr;</button>
        </div>
    </section>

    <!-- Games & Categories Section -->
    <div class="section-title">Popular Games</div>
    <section class="game-grid">
        <!-- Ice Fishing -->
        <div class="game-card" onclick="location.href='deposit.html'">
            <div class="badge">TOP</div>
            <div class="game-info">
                <h3>ICE FISHING</h3>
                <p>EVOLUTION</p>
            </div>
        </div>

        <!-- Aviator -->
        <div class="game-card" onclick="location.href='deposit.html'">
            <div class="badge">TOP</div>
            <div class="game-info">
                <h3>AVIATOR</h3>
                <p>SPRIBE</p>
            </div>
        </div>

        <!-- Neon Cricket -->
        <div class="game-card" onclick="location.href='deposit.html'">
            <div class="badge">TOP</div>
            <div class="game-info">
                <h3>NEON CRICKET</h3>
                <p>BATERY GAMES</p>
            </div>
        </div>

        <!-- Rummy -->
        <div class="game-card" onclick="location.href='deposit.html'">
            <div class="badge">TOP</div>
            <div class="game-info">
                <h3>RUMMY</h3>
                <p>JILI GAMES</p>
            </div>
        </div>

        <!-- JetX -->
        <div class="game-card" onclick="location.href='deposit.html'">
            <div class="badge">TOP</div>
            <div class="game-info">
                <h3>JETX</h3>
                <p>SMARTSOFT</p>
            </div>
        </div>

        <!-- Casino General -->
        <div class="game-card" onclick="location.href='deposit.html'">
            <div class="badge">TOP</div>
            <div class="game-info">
                <h3>LIVE CASINO</h3>
                <p>566 games</p>
            </div>
        </div>
    </section>

    <!-- Bottom Navigation Bar -->
    <nav class="bottom-nav">
        <a href="index.html" class="active"><i class="fa-solid fa-house"></i><span>Home</span></a>
        <a href="index.html"><i class="fa-solid fa-coins"></i><span>Casino</span></a>
        <a href="index.html"><i class="fa-solid fa-futbol"></i><span>Sport</span></a>
        <a href="deposit.html"><i class="fa-solid fa-ticket"></i><span>Bet slip</span></a>
        <a href="login.html"><i class="fa-solid fa-bars"></i><span>Menu</span></a>
    </nav>

    <script src="script.js"></script>

</html>
